<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Scope Header Left Multiple</title>
  <link rel="stylesheet" href="../layouts/styles.css">
  <script type="module" src="../handleKeyDown.js"></script>
</head>
<body>
  <div class="container" style="position: relative; min-height: 460px;">
    <section id="lrud-screen-screen1-header" style="position: absolute; left: 520px; top: 40px; width: 560px;">
      <div style="position: relative; display: flex; gap: 24px; align-items: flex-start;">
        <section id="lrud-screen-screen1-header-left">
          <div>
            <button tabindex="0" id="screen1-multi-header-left-focus">Screen 1 Header Left</button>
          </div>
        </section>

        <div>
          <div>
            <button tabindex="0" id="screen1-multi-header-main-focus">Screen 1 Header Main</button>
          </div>
        </div>

        <section id="lrud-screen-screen1-header-right">
          <div>
            <button tabindex="0" id="screen1-multi-header-right-focus">Screen 1 Header Right</button>
          </div>
        </section>
      </div>
    </section>

    <section id="lrud-screen-screen2-header" style="position: absolute; left: 120px; top: 40px;">
      <div>
        <div>
          <button tabindex="0" id="screen2-multi-header-focus">Screen 2 Header</button>
        </div>
      </div>
    </section>

    <section id="lrud-screen-screen1" style="position: absolute; left: 560px; top: 260px;">
      <div>
        <div>
          <button tabindex="0" id="screen1-multi-screen-focus">Screen 1 Button</button>
        </div>
      </div>
    </section>

    <section id="lrud-screen-screen2" style="position: absolute; left: 180px; top: 260px;">
      <div>
        <div>
          <button tabindex="0" id="screen2-multi-screen-focus">Screen 2 Button</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
